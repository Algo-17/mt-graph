name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Export Google Sheet
        run: |
          curl -fsSL \
            "https://docs.google.com/spreadsheets/d/1zgxL3AqJgiuBsfv7a15B_hDmV-Kb3VyC6O-uyNs-fPA/export?format=xlsx" \
            -o results.xlsx
      - run: pip install -r requirements.txt
      - run: mkdir -p dist && python build_graph.py results.xlsx dist/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
      - uses: actions/deploy-pages@v4
        id: deployment
